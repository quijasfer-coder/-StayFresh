# Config mínimo para `supabase start` en local. Para ver todas las
# opciones disponibles (storage, edge functions, etc.), corre
# `supabase init` en esta carpeta y compara — CLI la regenera con
# comentarios y defaults completos sin pisar lo que ya está aquí.
# Docs: https://supabase.com/docs/guides/local-development/cli/config
project_id = "stayfresh-web"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false
